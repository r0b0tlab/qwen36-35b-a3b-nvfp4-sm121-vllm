services:
  qwen36-nvfp4-vllm:
    image: ${IMAGE:-qwen36-35b-a3b-nvfp4-sm121-vllm:v025-mtp}
    build:
      context: .
      dockerfile: Dockerfile.v025
    container_name: qwen36-nvfp4-vllm
    network_mode: host
    ipc: host
    shm_size: 32gb
    ulimits:
      memlock: -1
    cap_add:
      - IPC_LOCK
    environment:
      PORT: ${PORT:-8000}
      MODEL_ID: /models/model
      SERVED_MODEL_NAME: Qwen3.6-35B-A3B-NVFP4
      KV_CACHE_DTYPE: fp8
      QUANTIZATION: modelopt_mixed
      MOE_BACKEND: flashinfer_b12x
      LINEAR_BACKEND: flashinfer_cutlass
      SPECULATIVE_CONFIG: '{"method":"mtp","num_speculative_tokens":2,"moe_backend":"triton"}'
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-65536}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS:-32}
      MAX_NUM_BATCHED_TOKENS: ${MAX_NUM_BATCHED_TOKENS:-32768}
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION:-0.88}
      LANGUAGE_MODEL_ONLY: ${LANGUAGE_MODEL_ONLY:-1}
      MAX_JOBS: 6
      FLASHINFER_NVCC_THREADS: 2
    volumes:
      - ${MODEL_PATH:?Set MODEL_PATH to the downloaded checkpoint}:/models/model:ro
      - qwen36-flashinfer-cache:/root/.cache/flashinfer
      - qwen36-vllm-cache:/root/.cache/vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "/usr/bin/python3", "/usr/local/bin/verify_server.py", "--health-only"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 5
    restart: unless-stopped

volumes:
  qwen36-flashinfer-cache:
  qwen36-vllm-cache:
