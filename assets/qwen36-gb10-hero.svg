<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">NVIDIA Qwen3.6 35B-A3B NVFP4 on GB10</title>
  <desc id="desc">r0b0tlab optimized SM121 serving profile with FP8 KV and MTP.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101b"/><stop offset=".52" stop-color="#102b45"/><stop offset="1" stop-color="#150d31"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#78f7a8"/><stop offset=".52" stop-color="#62f6ff"/><stop offset="1" stop-color="#b58cff"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#62f6ff" stop-opacity=".32"/><stop offset="1" stop-color="#62f6ff" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1280" height="420" rx="32" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="260" fill="url(#glow)" filter="url(#blur)"/>
